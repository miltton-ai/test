<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Helsinki Markets Gaming Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-dark: #0f1419;
            --bg-darker: #0a0d11;
            --bg-card: #1a1f2e;
            --accent-blue: #00d4ff;
            --accent-pink: #ff006e;
            --accent-yellow: #ffbe0b;
            --accent-green: #06ffa5;
            --text-primary: #e8ecf1;
            --text-secondary: #8b949e;
            --border: rgba(0, 212, 255, 0.3);
        }

        body {
            font-family: 'Rajdhani', sans-serif;
            background: linear-gradient(135deg, var(--bg-darker) 0%, var(--bg-dark) 100%);
            color: var(--text-primary);
            min-height: 100vh;
            padding: 1.5rem;
            overflow-x: hidden;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0, 212, 255, 0.03) 2px, rgba(0, 212, 255, 0.03) 4px);
            pointer-events: none;
            z-index: 1;
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
            position: relative;
            z-index: 2;
        }

        header {
            text-align: center;
            margin-bottom: 2rem;
            animation: glitchTitle 0.8s ease-out;
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(2rem, 5vw, 4rem);
            font-weight: 900;
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-pink), var(--accent-yellow));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            text-shadow: 0 0 30px rgba(0, 212, 255, 0.5);
            animation: neonPulse 2s ease-in-out infinite;
        }

        .subtitle {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(0.875rem, 1.5vw, 1.125rem);
            color: var(--accent-yellow);
            letter-spacing: 0.2em;
            text-transform: uppercase;
            margin-top: 0.5rem;
        }

        .main-grid {
            display: grid;
            grid-template-columns: repeat(12, 1fr);
            gap: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .stocks-section {
            grid-column: span 12;
        }

        .clocks-section {
            grid-column: span 7;
        }

        .news-section {
            grid-column: span 5;
        }

        @media (max-width: 1024px) {
            .clocks-section,
            .news-section {
                grid-column: span 12;
            }
        }

        .section-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--accent-blue);
            text-transform: uppercase;
            margin-bottom: 1rem;
            letter-spacing: 0.1em;
            text-shadow: 0 0 10px rgba(0, 212, 255, 0.8);
        }

        /* Osakkeet */
        .stocks-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 1.5rem;
        }

        .stock-box {
            background: var(--bg-card);
            border: 2px solid var(--border);
            border-radius: 1rem;
            padding: 1.5rem;
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
            animation: slideIn 0.6s ease-out backwards;
        }

        .stock-box:nth-child(1) { animation-delay: 0.1s; }
        .stock-box:nth-child(2) { animation-delay: 0.2s; }
        .stock-box:nth-child(3) { animation-delay: 0.3s; }
        .stock-box:nth-child(4) { animation-delay: 0.4s; }
        .stock-box:nth-child(5) { animation-delay: 0.5s; }

        .stock-box::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, transparent, var(--accent-blue), transparent);
            animation: scan 2s linear infinite;
        }

        .stock-box:hover {
            transform: translateY(-5px);
            border-color: var(--accent-blue);
            box-shadow: 0 8px 30px rgba(0, 212, 255, 0.4);
        }

        .stock-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }

        .stock-name {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text-primary);
        }

        .stock-ticker {
            font-size: 0.75rem;
            color: var(--text-secondary);
            text-transform: uppercase;
        }

        .stock-price {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--accent-yellow);
            text-shadow: 0 0 10px rgba(255, 190, 11, 0.5);
            margin: 0.5rem 0;
        }

        .stock-change {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 1rem;
            border-radius: 0.5rem;
            font-family: 'Orbitron', sans-serif;
            font-size: 1.125rem;
            font-weight: 700;
        }

        .stock-change.positive {
            background: rgba(6, 255, 165, 0.2);
            color: var(--accent-green);
            border: 1px solid var(--accent-green);
        }

        .stock-change.negative {
            background: rgba(255, 0, 110, 0.2);
            color: var(--accent-pink);
            border: 1px solid var(--accent-pink);
        }

        /* Kellot */
        .clocks-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 1rem;
        }

        .clock-box {
            background: var(--bg-card);
            border: 2px solid var(--border);
            border-radius: 1rem;
            padding: 1.5rem;
            text-align: center;
            transition: all 0.3s ease;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
        }

        .clock-box:hover {
            border-color: var(--accent-pink);
            transform: scale(1.05);
            box-shadow: 0 6px 25px rgba(255, 0, 110, 0.4);
        }

        .clock-city {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.875rem;
            font-weight: 700;
            color: var(--text-secondary);
            text-transform: uppercase;
            margin-bottom: 0.75rem;
        }

        .clock-time {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.75rem;
            font-weight: 700;
            color: var(--accent-blue);
            text-shadow: 0 0 10px rgba(0, 212, 255, 0.5);
            letter-spacing: 0.05em;
        }

        /* Uutiset */
        .news-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .news-item {
            background: var(--bg-card);
            border: 2px solid var(--border);
            border-radius: 0.75rem;
            padding: 1.25rem;
            text-decoration: none;
            color: inherit;
            transition: all 0.3s ease;
            display: block;
            position: relative;
            overflow: hidden;
        }

        .news-item::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 4px;
            background: var(--accent-yellow);
            transform: translateX(-4px);
            transition: transform 0.3s ease;
        }

        .news-item:hover {
            border-color: var(--accent-yellow);
            transform: translateX(5px);
            box-shadow: 0 4px 20px rgba(255, 190, 11, 0.3);
        }

        .news-item:hover::before {
            transform: translateX(0);
        }

        .news-title {
            font-weight: 600;
            font-size: 1rem;
            line-height: 1.5;
            color: var(--text-primary);
            margin-bottom: 0.5rem;
        }

        .news-date {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.75rem;
            color: var(--text-secondary);
            text-transform: uppercase;
        }

        /* Pacman Game */
        .game-section {
            margin-top: 2rem;
            background: var(--bg-darker);
            border: 3px solid var(--accent-pink);
            border-radius: 1rem;
            padding: 1.5rem;
            box-shadow: 0 0 30px rgba(255, 0, 110, 0.3);
        }

        .game-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }

        .game-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--accent-pink);
            text-transform: uppercase;
        }

        .game-score {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--accent-yellow);
        }

        .game-canvas {
            width: 100%;
            height: 400px;
            background: #000;
            border-radius: 0.5rem;
            position: relative;
            overflow: hidden;
            cursor: pointer;
        }

        .game-instructions {
            margin-top: 1rem;
            text-align: center;
            font-size: 0.875rem;
            color: var(--text-secondary);
        }

        .loading {
            text-align: center;
            padding: 2rem;
            color: var(--text-secondary);
        }

        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--border);
            border-top-color: var(--accent-blue);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }

        @keyframes glitchTitle {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-2px); }
            40% { transform: translateX(2px); }
            60% { transform: translateX(-2px); }
            80% { transform: translateX(2px); }
        }

        @keyframes neonPulse {
            0%, 100% { text-shadow: 0 0 30px rgba(0, 212, 255, 0.5); }
            50% { text-shadow: 0 0 50px rgba(0, 212, 255, 0.8); }
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes scan {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @media (max-width: 768px) {
            body {
                padding: 1rem;
            }

            .stocks-grid,
            .clocks-grid {
                grid-template-columns: 1fr;
            }

            .game-canvas {
                height: 300px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>HEX MARKETS</h1>
            <div class="subtitle">Gaming Dashboard</div>
        </header>

        <div class="main-grid">
            <!-- Osakkeet -->
            <div class="stocks-section">
                <h2 class="section-title">📊 Live Stocks</h2>
                <div id="stocks" class="stocks-grid">
                    <div class="loading">
                        <div class="loading-spinner"></div>
                        <div>Ladataan osakekursseja...</div>
                    </div>
                </div>
            </div>

            <!-- Kellot -->
            <div class="clocks-section">
                <h2 class="section-title">🌍 World Time</h2>
                <div id="clocks" class="clocks-grid"></div>
            </div>

            <!-- Uutiset -->
            <div class="news-section">
                <h2 class="section-title">📰 Business News</h2>
                <div id="news" class="news-list">
                    <div class="loading">
                        <div class="loading-spinner"></div>
                        <div>Ladataan uutisia...</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Pacman-peli -->
        <div class="game-section">
            <div class="game-header">
                <h2 class="game-title">🎮 Finnair vs SAS</h2>
                <div class="game-score">Score: <span id="score">0</span></div>
            </div>
            <canvas id="gameCanvas" class="game-canvas"></canvas>
            <div class="game-instructions">
                Käytä nuolinäppäimiä (↑ ↓ ← →) ohjataksesi Finnair-konetta syömään SAS-palloja!
            </div>
        </div>
    </div>

    <script>
        // ===== OSAKKEET =====
        const stockData = {
            'Finnair': { ticker: 'FIA1S', price: 0.82, change: -1.2 },
            'Nokia': { ticker: 'NOKIA', price: 4.35, change: 2.15 },
            'Aktia': { ticker: 'AKTIA', price: 11.20, change: 0.45 },
            'Nordea': { ticker: 'NDA-FI', price: 11.89, change: 1.30 },
            'Puuilo': { ticker: 'PUUILO', price: 7.82, change: -0.85 }
        };

        function displayStocks() {
            const stocksDiv = document.getElementById('stocks');
            let html = '';
            
            for (const [name, data] of Object.entries(stockData)) {
                const changeClass = data.change >= 0 ? 'positive' : 'negative';
                const changeSymbol = data.change >= 0 ? '▲' : '▼';
                
                html += `
                    <div class="stock-box">
                        <div class="stock-header">
                            <div>
                                <div class="stock-name">${name}</div>
                                <div class="stock-ticker">${data.ticker}</div>
                            </div>
                        </div>
                        <div class="stock-price">${data.price.toFixed(2)} €</div>
                        <div class="stock-change ${changeClass}">
                            ${changeSymbol} ${Math.abs(data.change).toFixed(2)}%
                        </div>
                    </div>
                `;
            }
            
            stocksDiv.innerHTML = html;
        }

        // ===== KELLOT =====
        const worldClocks = [
            { city: 'Tokio', timezone: 'Asia/Tokyo' },
            { city: 'Singapore', timezone: 'Asia/Singapore' },
            { city: 'Kyiv', timezone: 'Europe/Kiev' },
            { city: 'Helsinki', timezone: 'Europe/Helsinki' },
            { city: 'Pariisi', timezone: 'Europe/Paris' },
            { city: 'Lontoo', timezone: 'Europe/London' },
            { city: 'New York', timezone: 'America/New_York' }
        ];

        function updateClocks() {
            const clocksDiv = document.getElementById('clocks');
            let html = '';
            
            worldClocks.forEach(clock => {
                try {
                    const time = new Date().toLocaleTimeString('fi-FI', {
                        timeZone: clock.timezone,
                        hour: '2-digit',
                        minute: '2-digit',
                        second: '2-digit',
                        hour12: false
                    });
                    html += `
                        <div class="clock-box">
                            <div class="clock-city">${clock.city}</div>
                            <div class="clock-time">${time}</div>
                        </div>
                    `;
                } catch (e) {
                    console.error(`Virhe kellon ${clock.city} päivityksessä:`, e);
                }
            });
            
            clocksDiv.innerHTML = html;
        }

        // ===== UUTISET =====
        async function fetchNews() {
            const newsDiv = document.getElementById('news');
            const feedUrl = 'https://www.helsinkitimes.fi/?type=rss';
            const rssToJsonUrl = `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(feedUrl)}&api_key=jmnxgdfnzpj1s7s3wgjgj0t02edsfvftbgtxektr&count=6`;
            
            try {
                const response = await fetch(rssToJsonUrl);
                const data = await response.json();
                
                if (data.status === 'ok' && data.items && data.items.length > 0) {
                    let html = '';
                    data.items.slice(0, 6).forEach(item => {
                        const date = new Date(item.pubDate).toLocaleDateString('fi-FI', {
                            day: 'numeric',
                            month: 'short'
                        });
                        html += `
                            <a href="${item.link}" target="_blank" class="news-item">
                                <div class="news-title">${item.title}</div>
                                <div class="news-date">${date}</div>
                            </a>
                        `;
                    });
                    newsDiv.innerHTML = html;
                } else {
                    showFallbackNews();
                }
            } catch (error) {
                console.error('Virhe uutisten haussa:', error);
                showFallbackNews();
            }
        }

        function showFallbackNews() {
            const newsDiv = document.getElementById('news');
            const fallbackNews = [
                { title: 'Suomen talous kasvaa - positiivisia merkkejä', date: '27 tammi' },
                { title: 'Teknologiasektori vahva Helsingin pörssissä', date: '27 tammi' },
                { title: 'Nordean tuloskehitys ylittää odotukset', date: '26 tammi' },
                { title: 'Nokia tekee suuria investointeja 5G-teknologiaan', date: '26 tammi' },
                { title: 'Vähittäiskauppa piristyy - Puuilon vahva kvartaali', date: '25 tammi' },
                { title: 'Finanssiala jatkaa kasvuaan vuonna 2026', date: '25 tammi' }
            ];
            
            let html = '';
            fallbackNews.forEach(item => {
                html += `
                    <a href="https://www.helsinkitimes.fi" target="_blank" class="news-item">
                        <div class="news-title">${item.title}</div>
                        <div class="news-date">${item.date}</div>
                    </a>
                `;
            });
            newsDiv.innerHTML = html;
        }

        // ===== PACMAN GAME =====
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        // Set canvas size
        function resizeCanvas() {
            canvas.width = canvas.offsetWidth;
            canvas.height = canvas.offsetHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // Game variables
        let score = 0;
        const player = {
            x: 100,
            y: 200,
            size: 20,
            speed: 3,
            direction: 'right',
            mouthOpen: 0,
            mouthDirection: 1
        };

        const dots = [];
        const numDots = 20;

        // Initialize dots (SAS balls)
        function initDots() {
            dots.length = 0;
            for (let i = 0; i < numDots; i++) {
                dots.push({
                    x: Math.random() * (canvas.width - 40) + 20,
                    y: Math.random() * (canvas.height - 40) + 20,
                    size: 12,
                    collected: false
                });
            }
        }

        // Keyboard controls
        const keys = {};
        window.addEventListener('keydown', (e) => {
            keys[e.key] = true;
            if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(e.key)) {
                e.preventDefault();
            }
        });
        window.addEventListener('keyup', (e) => {
            keys[e.key] = false;
        });

        // Update game
        function update() {
            // Move player
            if (keys['ArrowUp'] || keys['w']) {
                player.y -= player.speed;
                player.direction = 'up';
            }
            if (keys['ArrowDown'] || keys['s']) {
                player.y += player.speed;
                player.direction = 'down';
            }
            if (keys['ArrowLeft'] || keys['a']) {
                player.x -= player.speed;
                player.direction = 'left';
            }
            if (keys['ArrowRight'] || keys['d']) {
                player.x += player.speed;
                player.direction = 'right';
            }

            // Keep player in bounds
            player.x = Math.max(player.size, Math.min(canvas.width - player.size, player.x));
            player.y = Math.max(player.size, Math.min(canvas.height - player.size, player.y));

            // Animate mouth
            player.mouthOpen += 0.1 * player.mouthDirection;
            if (player.mouthOpen > 0.5 || player.mouthOpen < 0) {
                player.mouthDirection *= -1;
            }

            // Check collision with dots
            dots.forEach(dot => {
                if (!dot.collected) {
                    const dx = player.x - dot.x;
                    const dy = player.y - dot.y;
                    const distance = Math.sqrt(dx * dx + dy * dy);
                    
                    if (distance < player.size + dot.size) {
                        dot.collected = true;
                        score += 10;
                        document.getElementById('score').textContent = score;
                    }
                }
            });

            // Respawn dots if all collected
            if (dots.every(dot => dot.collected)) {
                initDots();
            }
        }

        // Draw game
        function draw() {
            // Clear canvas
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw grid
            ctx.strokeStyle = 'rgba(0, 212, 255, 0.1)';
            ctx.lineWidth = 1;
            for (let x = 0; x < canvas.width; x += 40) {
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x, canvas.height);
                ctx.stroke();
            }
            for (let y = 0; y < canvas.height; y += 40) {
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(canvas.width, y);
                ctx.stroke();
            }

            // Draw dots (SAS balls)
            dots.forEach(dot => {
                if (!dot.collected) {
                    // SAS logo effect
                    ctx.fillStyle = '#0066cc';
                    ctx.beginPath();
                    ctx.arc(dot.x, dot.y, dot.size, 0, Math.PI * 2);
                    ctx.fill();
                    
                    // SAS text
                    ctx.fillStyle = '#fff';
                    ctx.font = 'bold 8px Arial';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText('SAS', dot.x, dot.y);
                }
            });

            // Draw player (Finnair plane)
            ctx.save();
            ctx.translate(player.x, player.y);
            
            // Rotate based on direction
            switch(player.direction) {
                case 'right': ctx.rotate(0); break;
                case 'left': ctx.rotate(Math.PI); break;
                case 'up': ctx.rotate(-Math.PI / 2); break;
                case 'down': ctx.rotate(Math.PI / 2); break;
            }

            // Draw Finnair colors
            const startAngle = player.mouthOpen * Math.PI / 4;
            const endAngle = Math.PI * 2 - startAngle;

            // Body
            ctx.fillStyle = '#0b5394';
            ctx.beginPath();
            ctx.arc(0, 0, player.size, startAngle, endAngle);
            ctx.lineTo(0, 0);
            ctx.fill();

            // Finnair logo stripe
            ctx.fillStyle = '#fff';
            ctx.fillRect(-player.size * 0.5, -2, player.size * 0.7, 4);

            ctx.restore();
        }

        // Game loop
        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        // ===== INIT =====
        function init() {
            displayStocks();
            updateClocks();
            fetchNews();
            initDots();
            gameLoop();
            
            // Update clocks every second
            setInterval(updateClocks, 1000);
            
            // Update news every 5 minutes
            setInterval(fetchNews, 300000);
        }

        // Start when ready
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
        } else {
            init();
        }
    </script>
</body>
</html>
