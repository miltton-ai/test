<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Helsinki Markets • Live Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Playfair+Display:wght@600;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0a0e27;
            --bg-secondary: #151932;
            --accent-blue: #00d4ff;
            --accent-pink: #ff006e;
            --accent-yellow: #ffbe0b;
            --text-primary: #ffffff;
            --text-secondary: #a0a8c5;
            --border-color: rgba(0, 212, 255, 0.2);
            --success: #00ff88;
            --danger: #ff3366;
        }

        body {
            font-family: 'Space Mono', monospace;
            background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 50%, #0a0e27 100%);
            color: var(--text-primary);
            overflow-x: hidden;
            min-height: 100vh;
            position: relative;
        }

        /* Animated background */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 20% 50%, rgba(0, 212, 255, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(255, 0, 110, 0.1) 0%, transparent 50%);
            animation: breathe 8s ease-in-out infinite;
            pointer-events: none;
            z-index: 0;
        }

        @keyframes breathe {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 0.6; }
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
            padding: 20px;
            position: relative;
            z-index: 1;
            padding-bottom: 450px;
        }

        header {
            text-align: center;
            padding: 40px 20px;
            animation: slideDown 0.8s ease-out;
        }

        @keyframes slideDown {
            from { transform: translateY(-50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2rem, 5vw, 4rem);
            font-weight: 800;
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-pink), var(--accent-yellow));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
            letter-spacing: -2px;
        }

        .subtitle {
            color: var(--text-secondary);
            font-size: clamp(0.9rem, 2vw, 1.1rem);
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        /* World Clocks */
        .world-clocks {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 15px;
            margin: 30px 0;
            animation: fadeIn 1s ease-out 0.2s both;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .clock-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .clock-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0, 212, 255, 0.1), transparent);
            transition: left 0.5s;
        }

        .clock-card:hover::before {
            left: 100%;
        }

        .clock-card:hover {
            transform: translateY(-5px);
            border-color: var(--accent-blue);
            box-shadow: 0 10px 30px rgba(0, 212, 255, 0.3);
        }

        .clock-city {
            font-size: 0.9rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 10px;
        }

        .clock-time {
            font-size: 1.8rem;
            font-weight: bold;
            color: var(--accent-blue);
        }

        /* Stock Cards */
        .stocks-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin: 40px 0;
            animation: fadeIn 1s ease-out 0.4s both;
        }

        .stock-card {
            background: linear-gradient(135deg, var(--bg-secondary) 0%, rgba(21, 25, 50, 0.8) 100%);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 25px;
            position: relative;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .stock-card::after {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(0, 212, 255, 0.1) 0%, transparent 70%);
            animation: rotate 20s linear infinite;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .stock-card:hover {
            transform: scale(1.05);
            border-color: var(--accent-blue);
            box-shadow: 0 15px 40px rgba(0, 212, 255, 0.4);
        }

        .stock-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            position: relative;
            z-index: 2;
        }

        .stock-name {
            font-size: 1.3rem;
            font-weight: bold;
            color: var(--text-primary);
        }

        .stock-symbol {
            font-size: 0.8rem;
            color: var(--text-secondary);
            background: rgba(0, 212, 255, 0.1);
            padding: 5px 10px;
            border-radius: 8px;
        }

        .stock-price {
            font-size: 2.5rem;
            font-weight: bold;
            margin: 15px 0;
            position: relative;
            z-index: 2;
        }

        .stock-change {
            display: inline-block;
            padding: 8px 15px;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: bold;
            margin-top: 10px;
            position: relative;
            z-index: 2;
        }

        .stock-change.positive {
            background: rgba(0, 255, 136, 0.2);
            color: var(--success);
        }

        .stock-change.negative {
            background: rgba(255, 51, 102, 0.2);
            color: var(--danger);
        }

        .stock-prediction {
            margin-top: 15px;
            padding: 15px;
            background: rgba(0, 212, 255, 0.05);
            border-left: 3px solid var(--accent-blue);
            border-radius: 8px;
            font-size: 0.85rem;
            color: var(--text-secondary);
            position: relative;
            z-index: 2;
        }

        .prediction-label {
            color: var(--accent-yellow);
            font-weight: bold;
            margin-bottom: 5px;
        }

        /* News Section */
        .news-section {
            margin: 40px 0;
            animation: fadeIn 1s ease-out 0.6s both;
        }

        .news-header {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            margin-bottom: 20px;
            color: var(--accent-pink);
            text-align: center;
        }

        .news-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }

        .news-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 15px;
            padding: 20px;
            transition: all 0.3s ease;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .news-card::before {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 3px;
            background: linear-gradient(90deg, var(--accent-blue), var(--accent-pink));
            transform: scaleX(0);
            transition: transform 0.3s ease;
        }

        .news-card:hover::before {
            transform: scaleX(1);
        }

        .news-card:hover {
            transform: translateY(-5px);
            border-color: var(--accent-pink);
            box-shadow: 0 10px 30px rgba(255, 0, 110, 0.3);
        }

        .news-source {
            font-size: 0.8rem;
            color: var(--accent-yellow);
            text-transform: uppercase;
            margin-bottom: 10px;
            letter-spacing: 1px;
        }

        .news-title {
            font-size: 1rem;
            line-height: 1.5;
            color: var(--text-primary);
        }

        /* Traffic Cameras */
        .cameras-section {
            margin: 40px 0;
            animation: fadeIn 1s ease-out 0.8s both;
        }

        .cameras-header {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            margin-bottom: 20px;
            color: var(--accent-yellow);
            text-align: center;
        }

        .cameras-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }

        .camera-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 15px;
            padding: 15px;
            overflow: hidden;
        }

        .camera-title {
            font-size: 1.1rem;
            color: var(--accent-blue);
            margin-bottom: 10px;
            text-align: center;
        }

        .camera-image {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 10px;
            background: rgba(0, 212, 255, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-secondary);
        }

        /* Pacman Game */
        .game-container {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 400px;
            background: linear-gradient(180deg, transparent 0%, var(--bg-primary) 20%);
            border-top: 2px solid var(--accent-blue);
            z-index: 100;
            overflow: hidden;
        }

        .game-header {
            text-align: center;
            padding: 15px;
            font-size: 1.2rem;
            color: var(--accent-yellow);
            background: rgba(10, 14, 39, 0.9);
        }

        .game-canvas {
            display: block;
            margin: 0 auto;
            background: var(--bg-primary);
        }

        .game-controls {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: none;
        }

        .control-pad {
            display: grid;
            grid-template-areas: 
                ". up ."
                "left . right"
                ". down .";
            gap: 10px;
            width: 180px;
            height: 180px;
        }

        .control-btn {
            background: rgba(0, 212, 255, 0.3);
            border: 2px solid var(--accent-blue);
            border-radius: 15px;
            color: var(--text-primary);
            font-size: 1.5rem;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 50px;
            height: 50px;
            user-select: none;
        }

        .control-btn:active {
            background: var(--accent-blue);
            transform: scale(0.95);
        }

        .control-btn.up { grid-area: up; }
        .control-btn.down { grid-area: down; }
        .control-btn.left { grid-area: left; }
        .control-btn.right { grid-area: right; }

        @media (max-width: 768px) {
            .game-controls {
                display: block;
            }

            .container {
                padding-bottom: 500px;
            }

            .game-container {
                height: 450px;
            }
        }

        .loading {
            text-align: center;
            color: var(--text-secondary);
            padding: 20px;
            font-size: 0.9rem;
        }

        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(0, 212, 255, 0.3);
            border-top-color: var(--accent-blue);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 10px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>HELSINKI MARKETS</h1>
            <p class="subtitle">Live Dashboard • Real-Time Data</p>
        </header>

        <!-- World Clocks -->
        <div class="world-clocks">
            <div class="clock-card">
                <div class="clock-city">Helsinki</div>
                <div class="clock-time" id="clock-helsinki">--:--:--</div>
            </div>
            <div class="clock-card">
                <div class="clock-city">London</div>
                <div class="clock-time" id="clock-london">--:--:--</div>
            </div>
            <div class="clock-card">
                <div class="clock-city">New York</div>
                <div class="clock-time" id="clock-newyork">--:--:--</div>
            </div>
            <div class="clock-card">
                <div class="clock-city">Hong Kong</div>
                <div class="clock-time" id="clock-hongkong">--:--:--</div>
            </div>
            <div class="clock-card">
                <div class="clock-city">Kyiv</div>
                <div class="clock-time" id="clock-kyiv">--:--:--</div>
            </div>
        </div>

        <!-- Stock Cards -->
        <div class="stocks-grid" id="stocks-container">
            <div class="loading"><span class="spinner"></span>Ladataan osakekursseja...</div>
        </div>

        <!-- News Section -->
        <div class="news-section">
            <h2 class="news-header">Talousuutiset</h2>
            <div class="news-grid" id="news-container">
                <div class="loading"><span class="spinner"></span>Ladataan uutisia...</div>
            </div>
        </div>

        <!-- Traffic Cameras -->
        <div class="cameras-section">
            <h2 class="cameras-header">Kelikamerat • Helsinki</h2>
            <div class="cameras-grid" id="cameras-container">
                <div class="camera-card">
                    <div class="camera-title">Kehä I</div>
                    <img class="camera-image" id="cam-keha1" alt="Kehä I kelikamera" />
                </div>
                <div class="camera-card">
                    <div class="camera-title">Kehä II</div>
                    <img class="camera-image" id="cam-keha2" alt="Kehä II kelikamera" />
                </div>
                <div class="camera-card">
                    <div class="camera-title">Kehä III</div>
                    <img class="camera-image" id="cam-keha3" alt="Kehä III kelikamera" />
                </div>
            </div>
        </div>
    </div>

    <!-- Pacman Game -->
    <div class="game-container">
        <div class="game-header">🎮 FINNAIR vs SAS • Use Arrow Keys or Touch Controls</div>
        <canvas id="gameCanvas" class="game-canvas"></canvas>
        <div class="game-controls">
            <div class="control-pad">
                <button class="control-btn up" data-dir="up">↑</button>
                <button class="control-btn down" data-dir="down">↓</button>
                <button class="control-btn left" data-dir="left">←</button>
                <button class="control-btn right" data-dir="right">→</button>
            </div>
        </div>
    </div>

    <script>
        // World Clocks
        function updateClocks() {
            const now = new Date();
            
            const zones = {
                'helsinki': 'Europe/Helsinki',
                'london': 'Europe/London',
                'newyork': 'America/New_York',
                'hongkong': 'Asia/Hong_Kong',
                'kyiv': 'Europe/Kiev'
            };

            Object.keys(zones).forEach(city => {
                const time = new Intl.DateTimeFormat('fi-FI', {
                    timeZone: zones[city],
                    hour: '2-digit',
                    minute: '2-digit',
                    second: '2-digit',
                    hour12: false
                }).format(now);
                
                document.getElementById(`clock-${city}`).textContent = time;
            });
        }

        updateClocks();
        setInterval(updateClocks, 1000);

        // Stock Data (Simulated with realistic movements)
        const stocks = [
            { name: 'Puuilo', symbol: 'PUUILO', basePrice: 8.45 },
            { name: 'Marimekko', symbol: 'MMO1V', basePrice: 17.80 },
            { name: 'Wärtsilä', symbol: 'WRT1V', basePrice: 18.25 },
            { name: 'KONE', symbol: 'KNEBV', basePrice: 52.30 },
            { name: 'Valmet', symbol: 'VALMT', basePrice: 23.65 }
        ];

        function generateStockData(stock) {
            const volatility = Math.random() * 0.04 - 0.02; // -2% to +2%
            const price = stock.basePrice * (1 + volatility);
            const change = (volatility * 100);
            
            const predictions = [
                "Tekninen analyysi viittaa nousutrendiin lähiviikkoina",
                "Varovainen optimismi, odotamme Q1-tuloksia",
                "Markkina-asema vahva, pitkän aikavälin näkymät hyvät",
                "Volatiliteetti odotettavissa, suositellaan tarkkailua",
                "Positiiviset signaalit institutionaalisilta sijoittajilta"
            ];
            
            return {
                ...stock,
                price: price.toFixed(2),
                change: change.toFixed(2),
                prediction: predictions[Math.floor(Math.random() * predictions.length)]
            };
        }

        function renderStocks() {
            const container = document.getElementById('stocks-container');
            const stockData = stocks.map(generateStockData);
            
            container.innerHTML = stockData.map(stock => `
                <div class="stock-card">
                    <div class="stock-header">
                        <div class="stock-name">${stock.name}</div>
                        <div class="stock-symbol">${stock.symbol}</div>
                    </div>
                    <div class="stock-price" style="color: ${stock.change >= 0 ? 'var(--success)' : 'var(--danger)'}">
                        €${stock.price}
                    </div>
                    <div class="stock-change ${stock.change >= 0 ? 'positive' : 'negative'}">
                        ${stock.change >= 0 ? '↗' : '↘'} ${Math.abs(stock.change)}%
                    </div>
                    <div class="stock-prediction">
                        <div class="prediction-label">📊 Ennuste</div>
                        ${stock.prediction}
                    </div>
                </div>
            `).join('');
        }

        renderStocks();
        setInterval(renderStocks, 15000); // Update every 15 seconds

        // News Section (RSS feeds simulated)
        async function loadNews() {
            const container = document.getElementById('news-container');
            
            // Simulated news - In production, you'd use actual RSS feeds
            const newsItems = [
                { source: 'Kauppalehti', title: 'Helsingin pörssi avautui varovaisesti nousujohteisesti tänään', url: 'https://www.kauppalehti.fi' },
                { source: 'Taloussanomat', title: 'Kone Oyj julkaisi vahvan vuosineljänneksen tuloksen', url: 'https://www.is.fi/taloussanomat' },
                { source: 'Reuters', title: 'US Stock Markets reach new highs amid tech sector growth', url: 'https://www.reuters.com' },
                { source: 'Financial Times', title: 'European markets show resilience despite global uncertainty', url: 'https://www.ft.com' },
                { source: 'Bloomberg', title: 'Nordic companies expand international presence', url: 'https://www.bloomberg.com' },
                { source: 'Talouselämä', title: 'Suomalaisten yritysten vienti kasvoi odotuksia enemmän', url: 'https://www.talouselama.fi' }
            ];

            container.innerHTML = newsItems.map(item => `
                <div class="news-card" onclick="window.open('${item.url}', '_blank')">
                    <div class="news-source">${item.source}</div>
                    <div class="news-title">${item.title}</div>
                </div>
            `).join('');
        }

        loadNews();

        // Traffic Cameras
        // Using placeholder images - real cameras would need proper API integration
        function loadCameras() {
            // These are placeholder URLs - in production, use actual traffic camera APIs
            const cameras = {
                'cam-keha1': 'https://weathercam.digitraffic.fi/C0150200.jpg',
                'cam-keha2': 'https://weathercam.digitraffic.fi/C0150500.jpg',
                'cam-keha3': 'https://weathercam.digitraffic.fi/C0151100.jpg'
            };

            Object.keys(cameras).forEach(id => {
                const img = document.getElementById(id);
                img.src = cameras[id] + '?t=' + Date.now();
                img.onerror = function() {
                    this.style.display = 'flex';
                    this.innerHTML = '📷 Kamera ei saatavilla';
                };
            });
        }

        loadCameras();
        setInterval(loadCameras, 60000); // Refresh every minute

        // Pacman Game
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        canvas.width = Math.min(window.innerWidth - 40, 800);
        canvas.height = 300;

        const game = {
            player: {
                x: 50,
                y: canvas.height / 2,
                size: 20,
                direction: 'right',
                speed: 3,
                mouthOpen: 0
            },
            pellets: [],
            score: 0,
            direction: { x: 1, y: 0 }
        };

        // Initialize pellets (SAS logos)
        for (let i = 0; i < 20; i++) {
            game.pellets.push({
                x: Math.random() * (canvas.width - 40) + 20,
                y: Math.random() * (canvas.height - 40) + 20,
                size: 12,
                active: true
            });
        }

        function drawPlayer() {
            ctx.save();
            ctx.translate(game.player.x, game.player.y);
            
            // Rotate based on direction
            if (game.player.direction === 'right') ctx.rotate(0);
            else if (game.player.direction === 'left') ctx.rotate(Math.PI);
            else if (game.player.direction === 'up') ctx.rotate(-Math.PI/2);
            else if (game.player.direction === 'down') ctx.rotate(Math.PI/2);

            // Draw Finnair-inspired character (blue with wings)
            game.player.mouthOpen += 0.15;
            const mouthAngle = Math.abs(Math.sin(game.player.mouthOpen)) * 0.5;
            
            ctx.beginPath();
            ctx.arc(0, 0, game.player.size, mouthAngle, 2 * Math.PI - mouthAngle);
            ctx.lineTo(0, 0);
            ctx.fillStyle = '#00d4ff';
            ctx.fill();

            // Wing
            ctx.fillStyle = '#0099cc';
            ctx.fillRect(-10, -5, 8, 3);
            ctx.fillRect(-10, 2, 8, 3);

            ctx.restore();
        }

        function drawPellets() {
            game.pellets.forEach(pellet => {
                if (pellet.active) {
                    // Draw SAS-inspired pellet (yellow/blue)
                    ctx.beginPath();
                    ctx.arc(pellet.x, pellet.y, pellet.size, 0, 2 * Math.PI);
                    ctx.fillStyle = '#ffbe0b';
                    ctx.fill();
                    ctx.strokeStyle = '#0051a3';
                    ctx.lineWidth = 2;
                    ctx.stroke();

                    // SAS text
                    ctx.fillStyle = '#0051a3';
                    ctx.font = 'bold 8px Space Mono';
                    ctx.textAlign = 'center';
                    ctx.fillText('SAS', pellet.x, pellet.y + 3);
                }
            });
        }

        function updatePlayer() {
            game.player.x += game.direction.x * game.player.speed;
            game.player.y += game.direction.y * game.player.speed;

            // Wrap around screen
            if (game.player.x < 0) game.player.x = canvas.width;
            if (game.player.x > canvas.width) game.player.x = 0;
            if (game.player.y < 0) game.player.y = canvas.height;
            if (game.player.y > canvas.height) game.player.y = 0;

            // Check collisions with pellets
            game.pellets.forEach(pellet => {
                if (pellet.active) {
                    const dx = game.player.x - pellet.x;
                    const dy = game.player.y - pellet.y;
                    const distance = Math.sqrt(dx * dx + dy * dy);
                    
                    if (distance < game.player.size + pellet.size) {
                        pellet.active = false;
                        game.score += 10;
                        
                        // Respawn pellet after 3 seconds
                        setTimeout(() => {
                            pellet.x = Math.random() * (canvas.width - 40) + 20;
                            pellet.y = Math.random() * (canvas.height - 40) + 20;
                            pellet.active = true;
                        }, 3000);
                    }
                }
            });
        }

        function drawScore() {
            ctx.fillStyle = '#00d4ff';
            ctx.font = 'bold 20px Space Mono';
            ctx.textAlign = 'left';
            ctx.fillText(`Score: ${game.score}`, 20, 30);
        }

        function gameLoop() {
            ctx.fillStyle = 'rgba(10, 14, 39, 0.3)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            updatePlayer();
            drawPellets();
            drawPlayer();
            drawScore();
            
            requestAnimationFrame(gameLoop);
        }

        // Keyboard controls
        document.addEventListener('keydown', (e) => {
            switch(e.key) {
                case 'ArrowUp':
                    game.direction = { x: 0, y: -1 };
                    game.player.direction = 'up';
                    e.preventDefault();
                    break;
                case 'ArrowDown':
                    game.direction = { x: 0, y: 1 };
                    game.player.direction = 'down';
                    e.preventDefault();
                    break;
                case 'ArrowLeft':
                    game.direction = { x: -1, y: 0 };
                    game.player.direction = 'left';
                    e.preventDefault();
                    break;
                case 'ArrowRight':
                    game.direction = { x: 1, y: 0 };
                    game.player.direction = 'right';
                    e.preventDefault();
                    break;
            }
        });

        // Touch controls for mobile
        document.querySelectorAll('.control-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const dir = btn.dataset.dir;
                switch(dir) {
                    case 'up':
                        game.direction = { x: 0, y: -1 };
                        game.player.direction = 'up';
                        break;
                    case 'down':
                        game.direction = { x: 0, y: 1 };
                        game.player.direction = 'down';
                        break;
                    case 'left':
                        game.direction = { x: -1, y: 0 };
                        game.player.direction = 'left';
                        break;
                    case 'right':
                        game.direction = { x: 1, y: 0 };
                        game.player.direction = 'right';
                        break;
                }
            });
        });

        // Resize canvas on window resize
        window.addEventListener('resize', () => {
            const newWidth = Math.min(window.innerWidth - 40, 800);
            if (newWidth !== canvas.width) {
                canvas.width = newWidth;
            }
        });

        // Start game
        gameLoop();
    </script>
</body>
</html>
